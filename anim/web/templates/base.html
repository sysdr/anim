<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SynapseFlow 2026{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #18181b;
      --primary: #3b82f6;
      --accent: #00f0ff;
      --accent-alt: #8b5cf6;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      background: rgba(10,10,11,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 1.25rem;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo svg { width: 24px; height: 24px; }
    .tabs {
      display: flex;
      gap: 0.25rem;
    }
    .tab {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 500;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .tab.active { color: var(--primary); background: rgba(59,130,246,0.15); }
    .badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      background: rgba(59,130,246,0.2);
      border-radius: 4px;
      color: var(--primary);
    }
    .main { padding: 2rem; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <header class="app-header">
    <a href="/" class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
      SynapseFlow 2026
    </a>
    <nav class="tabs">
      <a href="/dashboard" class="tab {% if active_tab == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/" class="tab {% if active_tab == 'studio' %}active{% endif %}">Studio</a>
      <a href="https://ai.google.dev" target="_blank" class="badge" style="text-decoration:none">Powered by Gemini</a>
    </nav>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  {% block extra_js %}{% endblock %}
</body>
</html>
